<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StackEdit Clone - Vanilla JS</title>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#f8f9fa] text-[#2c3e50] font-sans h-screen flex flex-col overflow-hidden">
    <header class="flex items-center justify-between px-4 py-2 bg-[#3675ff] text-white z-50 shadow-md">
        <div class="flex items-center gap-4">
            <button id="toggleSidebar" class="p-1.5 hover:bg-white/10 rounded-md transition-colors" title="File Explorer">
                <i data-lucide="menu" size="20"></i>
            </button>
            <div class="hidden md:flex items-center gap-1 border-l border-white/20 pl-4" id="toolbar">
                <!-- Toolbar buttons injected by JS -->
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div id="userProfile" class="hidden flex items-center gap-3">
                <img id="userAvatar" class="w-8 h-8 rounded-full border border-white/20" src="" alt="User Avatar" referrerPolicy="no-referrer">
                <span id="userName" class="hidden md:inline text-sm font-medium"></span>
                <button id="logoutBtn" class="p-1.5 hover:bg-white/10 rounded-md transition-colors" title="Logout">
                    <i data-lucide="log-out" size="18"></i>
                </button>
            </div>
            <button id="loginBtn" class="flex items-center gap-2 px-4 py-1.5 bg-blue-500 hover:bg-blue-600 rounded-md text-sm font-medium transition-colors">
                <i data-lucide="log-in" size="16"></i>
                Login with Google
            </button>
            <div class="flex items-center gap-2 px-3 py-1 bg-white/5 rounded text-sm font-medium border border-white/10">
                <i data-lucide="file-text" size="14" class="text-blue-400"></i>
                <input id="fileNameInput" class="bg-transparent border-none outline-none focus:ring-0 w-32 md:w-48 text-white" value="Welcome file">
            </div>
            <div class="flex items-center gap-1 bg-white/5 rounded p-0.5 border border-white/10">
                <button id="viewEditor" class="px-3 py-1 text-xs font-medium rounded transition-all bg-white/20 text-white">Editor</button>
                <button id="viewSplit" class="px-3 py-1 text-xs font-medium rounded transition-all text-gray-400 hover:text-gray-200">Split</button>
                <button id="viewPreview" class="px-3 py-1 text-xs font-medium rounded transition-all text-gray-400 hover:text-gray-200">Preview</button>
            </div>
        </div>
    </header>

    <main class="flex flex-1 overflow-hidden relative">
        <!-- Sidebar -->
        <aside id="sidebar" class="absolute left-0 top-0 bottom-0 w-72 bg-white border-r border-gray-200 z-50 flex flex-col shadow-xl transition-transform duration-300 -translate-x-full">
            <div class="p-4 border-b flex items-center justify-between bg-gray-50">
                <h2 class="font-bold text-gray-700 flex items-center gap-2">
                    <i data-lucide="folder" size="18" class="text-blue-500"></i>
                    Explorer
                </h2>
                <button id="newFile" class="p-1.5 bg-blue-500 text-white rounded-md hover:bg-blue-600 transition-colors" title="New File">
                    <i data-lucide="plus" size="18"></i>
                </button>
            </div>
            <div id="fileList" class="flex-1 overflow-y-auto p-2 space-y-1">
                <!-- File list injected by JS -->
            </div>
            <div class="p-4 border-t bg-gray-50 flex flex-col gap-3">
                <div class="flex items-center justify-between text-xs text-gray-400">
                    <span id="fileCount">0 files</span>
                    <div class="flex gap-2">
                        <button id="importBtn" class="hover:text-blue-500 transition-colors" title="Import Markdown File">
                            <i data-lucide="upload" size="14"></i>
                        </button>
                        <button class="hover:text-gray-600"><i data-lucide="settings" size="14"></i></button>
                    </div>
                </div>
                <div class="relative group">
                    <button id="downloadMenuBtn" class="w-full flex items-center justify-between px-3 py-2 bg-white border border-gray-200 rounded-md text-xs font-medium text-gray-700 hover:bg-gray-50 transition-colors">
                        <span class="flex items-center gap-2">
                            <i data-lucide="download" size="14"></i>
                            Download As...
                        </span>
                        <i data-lucide="chevron-up" size="14"></i>
                    </button>
                    <div id="downloadMenu" class="hidden absolute bottom-full left-0 w-full mb-1 bg-white border border-gray-200 rounded-md shadow-lg overflow-hidden z-[60]">
                        <button data-format="md" class="w-full text-left px-4 py-2 text-xs hover:bg-blue-50 hover:text-blue-600 transition-colors">Markdown (.md)</button>
                        <button data-format="html" class="w-full text-left px-4 py-2 text-xs hover:bg-blue-50 hover:text-blue-600 transition-colors">HTML (.html)</button>
                        <button data-format="txt" class="w-full text-left px-4 py-2 text-xs hover:bg-blue-50 hover:text-blue-600 transition-colors">Plain Text (.txt)</button>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Hidden file input for import -->
        <input type="file" id="fileInput" class="hidden" accept=".md,.txt,.markdown">
        <input type="file" id="imageInput" class="hidden" accept="image/*">

        <!-- Editor Pane -->
        <div id="editorPane" class="flex flex-col h-full bg-[#f8f9fa] w-full transition-all duration-300">
            <textarea id="editor" class="flex-1 p-8 font-mono text-[15px] leading-relaxed resize-none outline-none bg-transparent text-[#2c3e50] selection:bg-blue-100" placeholder="Start writing markdown..." spellcheck="false"></textarea>
        </div>

        <!-- Preview Pane -->
        <div id="previewPane" class="hidden flex flex-col h-full bg-white overflow-y-auto w-full transition-all duration-300">
            <div id="preview" class="prose prose-slate max-w-none p-8 md:p-12 lg:p-16"></div>
        </div>
    </main>

    <footer class="px-4 py-1 bg-white border-t border-gray-200 text-[11px] text-gray-400 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <span id="wordCount">Words: 0</span>
            <span id="charCount">Characters: 0</span>
        </div>
        <div class="flex items-center gap-2">
            <div class="w-2 h-2 rounded-full bg-green-500"></div>
            <span>Saved locally</span>
        </div>
    </footer>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
